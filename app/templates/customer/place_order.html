{% extends "base.html" %}
{% block title %}Đặt hàng{% endblock %}
{% block content %}
<h2>📦 Đặt hàng mới</h2>
<a href="{{ url_for('customer.dashboard') }}" class="btn btn-outline-secondary mb-3">← Quay lại</a>
<form method="POST">
    <div class="mb-3">
        <label>Địa chỉ lấy hàng</label>
        <textarea name="dia_chi_lay" class="form-control" rows="2" required></textarea>
    </div>
    <div class="mb-3">
        <label>Địa chỉ giao hàng</label>
        <textarea name="dia_chi_giao" class="form-control" rows="2" required></textarea>
    </div>
    <div class="row">
        <div class="col-md-6 mb-3">
            <label>Loại hàng</label>
            <select name="loai_hang" class="form-select">
                <option value="thuc_an">🍕 Thức ăn</option>
                <option value="tai_lieu">📄 Tài liệu</option>
                <option value="qua_tang">🎁 Quà tặng</option>
                <option value="khac">📦 Khác</option>
            </select>
        </div>
        <div class="col-md-6 mb-3">
            <label>Cân nặng (kg)</label>
            <input type="number" name="can_nang" class="form-control" value="1" step="0.1">
        </div>
    </div>
    <div class="mb-3">
        <label>Dịch vụ</label>
        <select name="service_type" class="form-select">
            <option value="hoa_toc">⚡ Giao hỏa tốc</option>
            <option value="trong_ngay">🌞 Giao trong ngày</option>
        </select>
    </div>
    <div class="mb-3">
        <label>Giá tiền (đ)</label>
        <input type="number" name="gia_tien" class="form-control" value="35000">
    </div>
    <div class="mb-3">
        <label>Ghi chú</label>
        <textarea name="ghi_chu" class="form-control" rows="2"></textarea>
    </div>
    <button type="submit" class="btn btn-primary btn-lg">✅ Đặt hàng</button>
</form>
{% endblock %}
