{% extends 'base.html' %}

{% block title %}Đăng ký{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-success text-white text-center">
                <h3 class="mb-0">📝 Đăng ký tài khoản</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Họ và tên</label>
                        <input type="text" name="ho_ten" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" 
                               placeholder="email@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Số điện thoại</label>
                        <input type="tel" name="so_dien_thoai" class="form-control" 
                               placeholder="0901234567" required pattern="[0-9]{10}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mật khẩu</label>
                        <input type="password" name="password" class="form-control" 
                               minlength="6" required>
                        <small class="text-muted">Ít nhất 6 ký tự</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Xác nhận mật khẩu</label>
                        <input type="password" name="confirm_password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-user-tag"></i> Loại tài khoản
                        </label>
                        <select name="vai_tro" class="form-select" required>
                            <option value="customer" selected>👤 Khách hàng</option>
                            <option value="driver">🚗 Tài xế</option>
                        </select>
                        <div class="form-text">
                            <small>
                                👤 Khách hàng: Đặt hàng, theo dõi đơn<br>
                                🚗 Tài xế: Nhận đơn, giao hàng (cần duyệt)
                            </small>
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success btn-lg">
                            <i class="fas fa-user-plus"></i> Đăng ký
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center">
                <p class="mb-0">Đã có tài khoản? <a href="{{ url_for('auth.login') }}">Đăng nhập</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
